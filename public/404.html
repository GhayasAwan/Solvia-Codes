<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Solvia Codes</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Jab bhi 404 milta hai, URL ko session storage mein store karo
      // aur index.html pe redirect karo
      var pathSegmentsToKeep = 1; // 1 = repo name segment rakhna hai

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
