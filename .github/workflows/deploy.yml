name: Deploy Solvia Codes to GitHub Pages

on:
  push:
    branches:
      - main   # main branch push hone par automatically deploy hoga

  # Manual trigger bhi allow karta hai
  workflow_dispatch:

# GitHub Pages deploy karne ke liye permissions
permissions:
  contents: read
  pages: write
  id-token: write

# Ek waqt mein sirf ek deployment chalega
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Step 1: Build
  build:
    name: Build Vite App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

  # Step 2: Deploy
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
